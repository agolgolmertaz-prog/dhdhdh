<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscape MP4 Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Force landscape container */
    .player-container {
      position: relative;
      width: 100vh;
      height: 56.25vh; /* 16:9 ratio */
      transform: rotate(90deg);
      transform-origin: center center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    /* Desktop / TV fix */
    @media (orientation: landscape) {
      .player-container {
        transform: none;
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
</head>
<body>

<div class="player-container">
  <video controls autoplay>
    <source src="https://videos.gia.tv/giatv/movies/playlist/211473/YTDown_com_YouTube_It_Takes_a_Man_and_a_Woman_FULL_MOVIE_Jo_Media_XkzDWNM6Rdo_003_480p.mp4" type="video/mp4">
    Your browser does not support MP4 playback.
  </video>
</div>

<script>
  // Try to force fullscreen for better IPTV/TV experience
  const video = document.querySelector('video');

  video.addEventListener('loadeddata', () => {
    if (video.requestFullscreen) {
      video.requestFullscreen().catch(() => {});
    }
  });

  // Lock orientation if supported
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
</script>

</body>
</html>

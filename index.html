<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auto Refresh Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
  let player;
  const video = document.getElementById('video');
  const url = "https://cdn-ue1-prod.tsv2.amagi.tv/linear/amg01006-abs-cbn-kapcha-dash-abscbnono/index.mpd";

  async function loadPlayer() {
    if (player) {
      await player.destroy(); // clean reload
    }

    player = new shaka.Player(video);

    player.configure({
      drm: {
        clearKeys: {
          "bd17afb5dc9648a39be79ee3634dd4b8": "b475084a1a58857e18480e30fbb0e544"
        }
      }
    });

    player.addEventListener('error', () => {
      console.log("Error detected, reloading...");
      reloadStream();
    });

    try {
      await player.load(url);
      console.log("Stream loaded");
    } catch (e) {
      console.log("Load failed, retrying...");
      setTimeout(reloadStream, 3000);
    }
  }

  function reloadStream() {
    loadPlayer();
  }

  // INITIAL LOAD
  loadPlayer();

  // 🔁 AUTO REFRESH EVERY 14 MINUTES
  setInterval(() => {
    console.log("Auto refreshing stream...");
    reloadStream();
  }, 14 * 60 * 1000); // 14 minutes

</script>

</body>
</html>

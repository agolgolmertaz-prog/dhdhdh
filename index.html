<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fullscreen Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }

    #btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 999;
      padding: 10px 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button id="btn">Fullscreen</button>
<video id="video" controls autoplay></video>

<script>
  async function initPlayer() {
    const video = document.getElementById('video');
    const player = new shaka.Player(video);

    player.addEventListener('error', e => console.error(e));

    player.configure({
      drm: {
        clearKeys: {
          "bd17afb5dc9648a39be79ee3634dd4b8": "b475084a1a58857e18480e30fbb0e544"
        }
      }
    });

    try {
      await player.load("https://cdn-ue1-prod.tsv2.amagi.tv/linear/amg01006-abs-cbn-kapcha-dash-abscbnono/index.mpd");
      console.log("Video loaded!");
    } catch (err) {
      console.error(err);
    }
  }

  document.addEventListener('DOMContentLoaded', initPlayer);

  // fullscreen button
  document.getElementById("btn").onclick = () => {
    const elem = document.documentElement;
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    }
  };
</script>

</body>
</html>

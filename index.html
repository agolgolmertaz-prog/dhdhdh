<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sound Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="overlay">CLICK TO START WITH SOUND 🔊</div>
<video id="video" playsinline></video>

<script>
  let player;
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');

  const url = "https://cdn-ue1-prod.tsv2.amagi.tv/linear/amg01006-abs-cbn-kapcha-dash-abscbnono/index.mpd";

  async function loadPlayer() {
    if (player) {
      await player.destroy();
    }

    player = new shaka.Player(video);

    player.configure({
      drm: {
        clearKeys: {
          "bd17afb5dc9648a39be79ee3634dd4b8": "b475084a1a58857e18480e30fbb0e544"
        }
      }
    });

    player.addEventListener('error', () => reloadStream());

    try {
      await player.load(url);
    } catch {
      setTimeout(reloadStream, 3000);
    }
  }

  function reloadStream() {
    loadPlayer();
  }

  // 👉 CLICK TO ENABLE SOUND
  overlay.addEventListener("click", () => {
    video.muted = false;
    video.volume = 1;
    video.play();

    overlay.style.display = "none";
  });

  // AUTO RECOVER
  video.addEventListener('stalled', reloadStream);
  video.addEventListener('ended', reloadStream);

  loadPlayer();

  // AUTO REFRESH
  setInterval(() => {
    reloadStream();
  }, 14 * 60 * 1000);

</script>

</body>
</html>

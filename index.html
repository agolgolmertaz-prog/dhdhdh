<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscape MP4 Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    .player-container {
      position: absolute;
      top: 0px;    /* ADJUST HERE */
      bottom: 0px; /* ADJUST HERE */
      left: 0px;   /* ADJUST HERE */
      right: 0px;  /* ADJUST HERE */

      transform: rotate(90deg);
      transform-origin: center center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    @media (orientation: landscape) {
      .player-container {
        transform: none;
      }
    }
  </style>
</head>
<body>

<div class="player-container">
  <video id="player" controls autoplay muted playsinline>
    <source src="https://videos.gia.tv/giatv/movies/playlist/211473/YTDown_com_YouTube_It_Takes_a_Man_and_a_Woman_FULL_MOVIE_Jo_Media_XkzDWNM6Rdo_003_480p.mp4" type="video/mp4">
  </video>
</div>

<script>
  const video = document.getElementById('player');

  // ===== MANUAL CROP SETTINGS (EDIT VALUES HERE) =====
  const CROP_TOP = 60;    // px
  const CROP_BOTTOM = 0; // px
  const CROP_LEFT = 0;   // px
  const CROP_RIGHT = 0;  // px

  // Apply crop using CSS clip-path
  function applyCrop() {
    video.style.clipPath = `inset(${CROP_TOP}px ${CROP_RIGHT}px ${CROP_BOTTOM}px ${CROP_LEFT}px)`;
  }

  applyCrop();
  video.muted = true; // ensure autoplay works on mobile
  const STORAGE_KEY = 'video-progress';

  // Load saved time
  video.addEventListener('loadedmetadata', () => {
    const savedTime = localStorage.getItem(STORAGE_KEY);
    if (savedTime) {
      video.currentTime = parseFloat(savedTime);
    }
    video.play().catch(() => {});
  });

  // Save progress
  setInterval(() => {
    if (!video.paused && !video.ended) {
      localStorage.setItem(STORAGE_KEY, video.currentTime);
    }
  }, 1000);

  video.addEventListener('pause', () => {
    localStorage.setItem(STORAGE_KEY, video.currentTime);
  });

  window.addEventListener('beforeunload', () => {
    localStorage.setItem(STORAGE_KEY, video.currentTime);
  });

  // Fullscreen attempt
  video.addEventListener('loadeddata', () => {
    if (video.requestFullscreen) {
      video.requestFullscreen().catch(() => {});
    }
  });

  // Lock orientation
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
</script>

</body>
</html>

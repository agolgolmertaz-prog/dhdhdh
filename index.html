<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auto Resume Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script>
  let player;
  const video = document.getElementById('video');

  const url = "https://cdn-ue1-prod.tsv2.amagi.tv/linear/amg01006-abs-cbn-kapcha-dash-abscbnono/index.mpd";

  async function loadPlayer() {
    if (player) {
      await player.destroy();
    }

    player = new shaka.Player(video);

    player.configure({
      drm: {
        clearKeys: {
          "bd17afb5dc9648a39be79ee3634dd4b8": "b475084a1a58857e18480e30fbb0e544"
        }
      }
    });

    player.addEventListener('error', () => {
      console.log("Error detected → reload");
      reloadStream();
    });

    try {
      await player.load(url);
      console.log("Loaded");

      tryPlay();

    } catch (e) {
      console.log("Load failed → retry");
      setTimeout(reloadStream, 3000);
    }
  }

  function reloadStream() {
    loadPlayer();
  }

  // 🔁 Try play (auto resume)
  function tryPlay() {
    video.play().catch(() => {
      setTimeout(() => {
        video.play();
      }, 1000);
    });
  }

  // 🎯 AUTO RESUME kapag nag pause
  video.addEventListener('pause', () => {
    console.log("Paused → resume");
    tryPlay();
  });

  // 🎯 AUTO RESUME kapag nag buffering
  video.addEventListener('waiting', () => {
    console.log("Buffering → resume");
    tryPlay();
  });

  // 🎯 Kapag natigil
  video.addEventListener('stalled', () => {
    console.log("Stalled → reload");
    reloadStream();
  });

  // 🎯 Kapag nag end (rare sa live)
  video.addEventListener('ended', () => {
    console.log("Ended → reload");
    reloadStream();
  });

  // INITIAL LOAD
  loadPlayer();

  // 🔁 AUTO REFRESH every 14 mins
  setInterval(() => {
    console.log("Auto refresh...");
    reloadStream();
  }, 14 * 60 * 1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Advanced Shaka Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
</head>
<body>

<video id="video"
       width="800"
       controls
       autoplay
       muted>
</video>

<script>
const video = document.getElementById('video');
const manifestUri = "http://136.239.158.10:6610/001/2/ch00000090990000001179/manifest.mpd?AuthInfo=v87HD9rEhwHiAdYyrP20Tg5pgSMSITY%2FHYvvCWJRp%2Bow35sHUcBhGBpxqddBGYEnytokK1MIobcue1ImXa0ZEA%3D%3D&version=v1.0&BreakPoint=0&virtualDomain=001.live_hls.zte.com&programid=ch00000000000000001415&contentid=ch00000000000000001415&videoid=ch00000090990000001179&recommendtype=0&userid=1205050496206&boid=001&stbid=02%3A00%3A00%3A00%3A00%3A00&terminalflag=1&profilecode=&usersessionid=02WMA0HI2O3AXX&NeedJITP=1&JITPMediaType=DASH&JITPDRMType=NO";

let player;

async function init() {
  player = new shaka.Player(video);

  // ✅ ADD HEADERS + COOKIES SUPPORT
  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.allowCrossSiteCredentials = true;

    // OPTIONAL: lagay mo kung kailangan
    request.headers['Referer'] = location.href;
    request.headers['User-Agent'] = navigator.userAgent;
  });

  player.addEventListener('error', onError);

  await loadVideo();
}

async function loadVideo() {
  try {
    await player.load(manifestUri);
    console.log("✅ Video loaded");

    video.play().catch(() => {
      console.log("Autoplay blocked");
    });

  } catch (e) {
    console.error("❌ Load error, retrying...", e);
    setTimeout(loadVideo, 3000);
  }
}

// 🔁 AUTO RETRY PAG NAG-ERROR (TOKEN EXPIRED)
function onError(event) {
  console.log("⚠️ Player error, reloading...");
  setTimeout(loadVideo, 2000);
}

// ▶️ INIT
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>

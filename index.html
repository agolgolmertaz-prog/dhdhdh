<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
  }

  #sidebar {
    width: 300px;
    background: #1c1c1c;
    height: 100vh;
    display: flex;
    flex-direction: column;
    border-right: 2px solid #333;
  }

  #sidebarHeader {
    position: sticky;
    top: 0;
    background: #000;
    z-index: 10;
    padding: 10px;
  }

  #search {
    width: 100%;
    padding: 8px;
    border: none;
    outline: none;
  }

  #channelList {
    flex: 1;
    overflow-y: auto;
  }

  .channel {
    padding: 10px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .channel:hover {
    background: #333;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  video {
    width: 100%;
    height: 70vh;
    background: black;
  }

  #controls {
    padding: 10px;
    background: #000;
  }
</style>
</head>

<body>

<div id="sidebar">
  <div id="sidebarHeader">
    <h2>Channels</h2>
    <input type="text" id="search" placeholder="Search channel...">
  </div>

  <div id="channelList"></div>
</div>

<div id="main">
  <video id="player" controls></video>
  <div id="controls">
    <p id="nowPlaying">Select a channel</p>
  </div>
</div>

<script>
const playlistUrl = "https://raw.githubusercontent.com/adg-cloud/astro/main/astro.m3u";

let channels = [];
let hls;

// LOAD PLAYLIST
fetch(playlistUrl)
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");

    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXTINF")) {
        const name = lines[i].split(",")[1]?.trim() || "Unknown";
        const url = lines[i + 1]?.trim();

        if (url) {
          channels.push({ name, url });
        }
      }
    }

    displayChannels(channels);
  })
  .catch(err => {
    console.error("Playlist load failed:", err);
    alert("Failed to load playlist.");
  });

// DISPLAY CHANNELS
function displayChannels(list) {
  const container = document.getElementById("channelList");
  container.innerHTML = "";

  list.forEach(channel => {
    const div = document.createElement("div");
    div.className = "channel";
    div.textContent = channel.name;

    div.onclick = () => playChannel(channel);

    container.appendChild(div);
  });
}

// PLAY CHANNEL
function playChannel(channel) {
  const player = document.getElementById("player");

  // destroy previous HLS instance
  if (hls) {
    hls.destroy();
  }

  if (channel.url.includes(".m3u8") && Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(channel.url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      player.play().catch(() => {});
    });

  } else {
    player.src = channel.url;
    player.play().catch(() => {});
  }

  document.getElementById("nowPlaying").textContent =
    "Now Playing: " + channel.name;
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  const filtered = channels.filter(c =>
    c.name.toLowerCase().includes(value)
  );

  displayChannels(filtered);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My IPTV Player</title>
<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
  }

  #sidebar {
    width: 300px;
    background: #1c1c1c;
    height: 100vh;
    display: flex;
    flex-direction: column;
    border-right: 2px solid #333;
  }

  /* FIXED HEADER */
  #sidebarHeader {
    position: sticky;
    top: 0;
    background: #000;
    z-index: 10;
    padding: 10px;
  }

  #sidebarHeader h2 {
    margin: 0 0 10px 0;
    text-align: center;
  }

  #search {
    width: 100%;
    padding: 8px;
    border: none;
    outline: none;
  }

  /* SCROLLABLE CHANNEL LIST */
  #channelList {
    flex: 1;
    overflow-y: auto;
  }

  .channel {
    padding: 10px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .channel:hover {
    background: #333;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  video {
    width: 100%;
    height: 70vh;
    background: black;
  }

  #controls {
    padding: 10px;
    background: #000;
  }
</style>
</head>

<body>

<div id="sidebar">
  <div id="sidebarHeader">
    <h2>Channels</h2>
    <input type="text" id="search" placeholder="Search channel...">
  </div>

  <div id="channelList"></div>
</div>

<div id="main">
  <video id="player" controls autoplay></video>
  <div id="controls">
    <p id="nowPlaying">Select a channel</p>
  </div>
</div>

<script>
const playlistUrl = "https://raw.githubusercontent.com/adg-cloud/astro/refs/heads/main/astro.m3u";

let channels = [];

fetch(playlistUrl)
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");

    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXTINF")) {
        const name = lines[i].split(",")[1];
        const url = lines[i + 1];

        channels.push({ name, url });
      }
    }

    displayChannels(channels);
  });

function displayChannels(list) {
  const container = document.getElementById("channelList");
  container.innerHTML = "";

  list.forEach(channel => {
    const div = document.createElement("div");
    div.className = "channel";
    div.textContent = channel.name;

    div.onclick = () => playChannel(channel);

    container.appendChild(div);
  });
}

function playChannel(channel) {
  const player = document.getElementById("player");

  player.src = channel.url;
  player.muted = true;

  player.play().then(() => {
    setTimeout(() => {
      player.muted = false;
    }, 1000);
  });

  document.getElementById("nowPlaying").textContent = "Now Playing: " + channel.name;
}

document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  const filtered = channels.filter(c => c.name.toLowerCase().includes(value));
  displayChannels(filtered);
});



// BLOCK IF ALREADY FLAGGED
if (localStorage.getItem("blocked") === "true") {
  document.body.innerHTML = "<h1 style='color:red;position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);'>ACCESS DENIED</h1>";
  throw new Error("Blocked");
}

// BLOCK RIGHT CLICK
document.addEventListener("contextmenu", e => e.preventDefault());

// BLOCK KEYS
document.addEventListener("keydown", function(e) {

  // F12
  if (e.key === "F12") blockUser();

  // Ctrl+Shift+I / C / J
  if (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key.toUpperCase())) {
    blockUser();
  }

  // Ctrl+U
  if (e.ctrlKey && e.key.toUpperCase() === "U") {
    blockUser();
  }
});

// DEVTOOLS DETECTION
setInterval(function() {
  const widthThreshold = window.outerWidth - window.innerWidth > 160;
  const heightThreshold = window.outerHeight - window.innerHeight > 160;

  if (widthThreshold || heightThreshold) {
    blockUser();
  }
}, 1000);


  // ✅ Check agad kung blocked
  if (localStorage.getItem("blocked") === "true") {
    blockUser();
  }

  // BLOCK FUNCTION
  function blockUser() {
    localStorage.setItem("blocked", "true");

    document.body.innerHTML = `
      <h1 style="
        color:red;
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        font-size:40px;
        z-index:9999;
      ">
        ACCESS DENIED
      </h1>
    `;

    document.addEventListener("click", e => e.stopPropagation(), true);
    document.addEventListener("keydown", e => e.preventDefault(), true);
    document.addEventListener("contextmenu", e => e.preventDefault(), true);
    document.body.style.overflow = "hidden";
  }

  // ✅ Rest of your code (channel loading, search, etc.)
  // ...



</script>
<script disable-devtool-auto
src="https://cdn.jsdelivr.net/npm/disable-devtool"></script>
</body>
</html>

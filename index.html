<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscape MP4 Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

  

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    @media (orientation: landscape) {
      .player-container {
        transform: none;
      }
    }
  </style>
</head>
<body>

<div class="player-container">
  <video id="player" autoplay playsinline muted>

  </video>
</div>

<script>
  const video = document.getElementById('player');
  const STORAGE_KEY = 'video-progress';

  // ===== MANUAL CROP SETTINGS =====
  const CROP_TOP = 80;
  const CROP_BOTTOM = 80;
  const CROP_LEFT = 0;
  const CROP_RIGHT = 0;

  // ===== AUTO-STRETCH SETTINGS =====
  const AUTO_STRETCH_LEFT = true;
  const AUTO_STRETCH_RIGHT = true;

  function applyCropAndStretch() {
    let top = CROP_TOP;
    let bottom = CROP_BOTTOM;
    let left = CROP_LEFT;
    let right = CROP_RIGHT;

    if(AUTO_STRETCH_LEFT) left = 0;
    if(AUTO_STRETCH_RIGHT) right = 0;

    video.style.clipPath = `inset(${top}px ${right}px ${bottom}px ${left}px)`;
    video.style.width = '100%';
    video.style.height = '100%';
  }

  applyCropAndStretch();

  // Load saved time and autoplay muted
  video.addEventListener('loadedmetadata', () => {
    const savedTime = localStorage.getItem(STORAGE_KEY);
    if (savedTime) {
      video.currentTime = parseFloat(savedTime);
    }
    video.play().catch(() => {});
  });

  // Save progress
  setInterval(() => {
    if (!video.paused && !video.ended) {
      localStorage.setItem(STORAGE_KEY, video.currentTime);
    }
  }, 1000);

  window.addEventListener('beforeunload', () => {
    localStorage.setItem(STORAGE_KEY, video.currentTime);
  });

  // Fullscreen attempt
  video.addEventListener('loadeddata', () => {
    if (video.requestFullscreen) {
      video.requestFullscreen().catch(() => {});
    }
  });

  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
